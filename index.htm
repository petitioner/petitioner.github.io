<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <link href="src/css/my.css" rel="stylesheet" type="text/css"/>
    <script src="src/js/jquery-3.6.3.js"></script>
    <title>John Chiang's Page</title>
    <style>
        /* 新增 CSS 样式 */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .row {
            flex: 1;
            display: flex;
        }

        .leftcolumn {
            background-color: #f1f1f1;
            width: 250px; /* 左列宽度 */
            position: -webkit-sticky;
            position: sticky;
            top: 0px;
        }

        .rightcolumn {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>John Chiang's Page</h1>
    </div>
    <div id="headerContainer"></div>
    <script>
        $(function() {
            $("#headerContainer").load("header.htm");
        });
    </script>
    <div class="topnav">
        <a href="#">Link</a>
        <a href="#">Link</a>
        <a href="#">Link</a>
        <a href="#" style="float: right;">Link</a>
    </div>
    <div class="row">
        <div class="leftcolumn" id="leftcolumnContainer"></div>
        <script>
            // 使用 JavaScript 动态加载模块
            const leftcolumnContainer = document.getElementById('leftcolumnContainer');
            fetch('leftcolumn.htm')
                .then(response => response.text())
                .then(html => {
                    leftcolumnContainer.innerHTML = html;
                });
        </script>
        <div class="rightcolumn">
            <div class="card">
                <!-- 其他右列内容 -->
            </div>
        </div>
    </div>
    <div class="footer">
        <h2>John C. Smith</h2>
    </div>
    <div id="footerContainer"></div>
    <script>
        // 使用 JavaScript 动态加载模块
        const footerContainer = document.getElementById('footerContainer');
        fetch('footer.htm')
            .then(response => response.text())
            .then(html => {
                footerContainer.innerHTML = html;
            });
    </script>
</body>
</html>
